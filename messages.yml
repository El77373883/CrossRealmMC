es:
  prefix: "&7[&bCrossRealmMC&7] "
  plugin-enabled: "&aPlugin activado correctamente."
  plugin-disabled: "&cPlugin desactivado."
  bridge-started: "&aBridge Bedrock iniciado en el puerto &e{port}&a."
  bridge-failed: "&cError al iniciar el bridge en el puerto &e{port}&c."
  bridge-restarted: "&eEl bridge se reinicio automaticamente."

  player-join-bedrock: "&7[&bBedrock&7] &a{player} &7se ha unido desde Bedrock &8({version})"
  player-join-java: "&7[&aJava&7] &a{player} &7se ha unido desde Java"
  player-leave: "&7{player} &7se ha desconectado."

  version-not-supported: "&cTu version de Bedrock &e({version}) &cno esta soportada."
  server-full-bedrock: "&cEl servidor llego al limite de jugadores Bedrock."
  maintenance-bedrock: "&cEl acceso Bedrock esta en mantenimiento."
  maintenance-java: "&cEl acceso Java esta en mantenimiento."

  ban-success: "&aJugador &e{player} &abaneado correctamente. Edicion: &e{edition}"
  ban-already: "&c{player} &cya esta baneado."
  ban-not-found: "&cJugador &e{player} &cno encontrado."
  unban-success: "&aJugador &e{player} &adesbanneado."
  banned-message: "&cEstas baneado de este servidor."

  anticheat-kick: "&cFuiste expulsado por comportamiento invalido."
  reconnect-cooldown: "&cDebes esperar &e{seconds} &csegundos antes de reconectar."

  cmd-reload: "&aConfiguracion recargada correctamente."
  cmd-info: |
    &b--- CrossRealmMC Info ---
    &7Version: &a{version}
    &7Jugadores Java: &a{java-players}
    &7Jugadores Bedrock: &b{bedrock-players}
    &7Bridge: &a{bridge-status}
    &7Puerto Bedrock: &e{bedrock-port}
    &7Modo online Java: &e{java-online}
    &7Modo online Bedrock: &e{bedrock-online}
  cmd-list: |
    &b--- Jugadores Conectados ---
    &aJava &7({java-count}): &f{java-list}
    &bBedrock &7({bedrock-count}): &f{bedrock-list}
  cmd-help: |
    &b--- CrossRealmMC Comandos ---
    &e/crmc info &7- Informacion del plugin
    &e/crmc list &7- Lista de jugadores
    &e/crmc reload &7- Recargar configuracion
    &e/crmc ban <jugador> [java|bedrock] &7- Banear jugador
    &e/crmc unban <jugador> &7- Desbanear jugador
    &e/crmc stats &7- Estadisticas
    &e/crmc maintenance <bedrock|java> <on|off> &7- Mantenimiento
  cmd-stats: |
    &b--- Estadisticas CrossRealmMC ---
    &7Conexiones totales Bedrock: &b{total-bedrock}
    &7Conexiones totales Java: &a{total-java}
    &7Kicks por anticheat: &c{anticheat-kicks}
    &7Bans activos: &c{active-bans}
  no-permission: "&cNo tienes permiso para esto."
  unknown-command: "&cSubcomando desconocido. Usa &e/crmc help"


name: 🔨 Build CrossRealmMC

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar CrossRealmMC
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar codigo
        uses: actions/checkout@v4
      - name: ☕ Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: 🔨 Compilar con Maven
        run: mvn clean package -B
      - name: 📦 Subir CrossRealmMC.jar
        uses: actions/upload-artifact@v4
        with:
          name: CrossRealmMC-1.0.0
          path: target/CrossRealmMC.jar
          retention-days: 30
      - name: ✅ Build completado
        run: echo "CrossRealmMC.jar compilado por soyadrianyt001"
